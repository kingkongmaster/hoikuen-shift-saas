<html lang="ja">
<head>

<title>HoikuShift SaaS v16.3 Final</title>
<link rel="manifest" href="./manifest.webmanifest">
<style>
:root{--navy:#1e3a5f;--blue:#2563eb;--bg:#f4f7fb;--line:#dce4ef;--muted:#64748b;--white:#fff}
*{box-sizing:border-box}body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Noto Sans JP",sans-serif;background:var(--bg);color:#1f2937}
.hidden{display:none!important}.top{height:56px;background:var(--navy);color:#fff;display:flex;align-items:center;justify-content:space-between;padding:0 18px;position:sticky;top:0;z-index:30}.top h1{font-size:17px;margin:0}.top small{opacity:.75}.wrap{max-width:1180px;margin:auto;padding:18px}.card{background:#fff;border:1px solid var(--line);border-radius:14px;padding:18px;margin-bottom:14px;box-shadow:0 2px 8px #1e3a5f0d}.btn{border:1px solid var(--line);background:#fff;padding:9px 13px;border-radius:9px;cursor:pointer}.primary{background:var(--navy);color:#fff;border-color:var(--navy)}.blue{background:var(--blue);color:#fff;border-color:var(--blue)}.danger{color:#b91c1c}.grid{display:grid;gap:12px}.g2{grid-template-columns:repeat(2,1fr)}.g3{grid-template-columns:repeat(3,1fr)}label{font-size:11px;color:var(--muted);display:block;margin-bottom:4px}input,select{width:100%;padding:10px;border:1px solid var(--line);border-radius:8px;background:#fff;font-size:14px}.auth{max-width:460px;margin:7vh auto}.tabs{display:flex;gap:6px;overflow:auto;margin-bottom:14px}.tab{white-space:nowrap;border:0;background:transparent;padding:9px 13px;color:var(--muted);border-radius:8px}.tab.active{background:#fff;color:var(--navy);font-weight:700;box-shadow:0 1px 5px #0001}.toolbar{display:flex;gap:8px;align-items:center;justify-content:space-between;flex-wrap:wrap}.month{font-size:19px;font-weight:700;color:var(--navy)}table{width:100%;border-collapse:separate;border-spacing:3px;table-layout:fixed}th{font-size:11px;color:var(--muted);padding:5px}td{vertical-align:top}.day{min-height:98px;background:#fff;border:1px solid var(--line);border-radius:9px;padding:6px;cursor:pointer}.day.empty{border-color:transparent;background:transparent}.date{font-size:12px;font-weight:700}.pill{display:block;font-size:10px;border-radius:6px;padding:4px;margin-top:3px;text-align:center;font-weight:700}.E{background:#dbeafe;color:#1e40af}.N{background:#dcfce7;color:#166534}.L{background:#ffedd5;color:#9a3412}.O{background:#fee2e2;color:#991b1b}.P{background:#ede9fe;color:#5b21b6}.H{background:#f1f5f9;color:#64748b}.event{font-size:9px;background:#eef2ff;color:#3730a3;border-radius:5px;padding:3px;margin-top:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.count{font-size:9px;color:var(--muted);margin-top:4px}.holiday{font-size:9px;background:#fee2e2;color:#b91c1c;border-radius:5px;padding:3px;margin-top:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-weight:700}.day.holiday-day{background:#fffafa;border-color:#fecaca}.date.holiday-date{color:#dc2626}.calendar-source{font-size:10px;color:var(--muted);margin:7px 0 3px}.listrow{display:flex;justify-content:space-between;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid #edf1f6}.badge{font-size:10px;background:#eef2f7;padding:4px 7px;border-radius:99px}.modal{position:fixed;inset:0;background:#0f172a66;display:flex;align-items:center;justify-content:center;z-index:50;padding:16px;box-sizing:border-box;overflow:hidden}.sheet{background:#fff;width:min(620px,100%);max-height:calc(100dvh - 32px);overflow-y:auto;overscroll-behavior:contain;-webkit-overflow-scrolling:touch;border-radius:18px;padding:20px;box-sizing:border-box;margin:auto}@media(max-width:650px){.modal{padding:10px}.sheet{width:100%;max-height:calc(100dvh - 20px);border-radius:16px;padding:16px}}.notice{font-size:12px;padding:10px;border-radius:8px;background:#eff6ff;color:#1e40af;margin:8px 0}.bottom{display:none}#printArea{display:none}
@media(max-width:650px){.wrap{padding:10px 8px 78px}.top{height:50px;padding:0 10px}.top h1{font-size:14px}.top small{display:none}.tabs{display:none}.g2,.g3{grid-template-columns:1fr}.card{padding:12px}.day{min-height:76px;padding:4px}.pill{font-size:9px;padding:3px 1px}.event,.count{font-size:8px}.bottom{display:grid;grid-template-columns:repeat(4,1fr);position:fixed;bottom:0;left:0;right:0;height:64px;background:#fff;border-top:1px solid var(--line);z-index:40;padding-bottom:env(safe-area-inset-bottom)}.bottom button{border:0;background:#fff;font-size:10px;color:var(--muted)}.bottom button.active{color:var(--navy);font-weight:700}.bottom b{display:block;font-size:20px}.admin-desktop{display:none!important}}
@media print{@page{size:A4 landscape;margin:9mm}body{background:#fff!important;color:#111!important}body>*:not(#printArea){display:none!important}#printArea{display:block!important;font-family:"Noto Sans JP",sans-serif;font-size:8pt}.print-title{display:flex;justify-content:space-between;align-items:flex-end;border-bottom:2px solid #1e3a5f;padding-bottom:3mm;margin-bottom:3mm}.print-title h1{font-size:17pt;margin:0}.print-title p{margin:0;color:#334155}.print-table{width:100%;border-collapse:collapse;table-layout:fixed}.print-table th,.print-table td{border:1px solid #94a3b8;padding:1mm .5mm;text-align:center;vertical-align:middle;word-break:break-all}.print-table th{background:#eaf0f8;font-size:6.5pt}.print-table th:first-child,.print-table td:first-child{width:25mm;text-align:left;padding-left:1.5mm}.print-table .weekend{background:#eff6ff;color:#1d4ed8}.print-table .sunday,.print-table .holiday{background:#fff1f2;color:#b91c1c}.print-table .event-note{display:block;font-size:5pt;font-weight:400;line-height:1.1;margin-top:.5mm}.print-table .shift-code{font-weight:700;font-size:7pt}.print-table .shift-name{display:block;font-size:5.5pt;line-height:1.1}.print-footer{font-size:6pt;color:#64748b;margin-top:3mm;text-align:right}}
</style>
</head>
<body>
<div id="auth" class="auth wrap">
  <div class="card"><h2 style="color:var(--navy)">HoikuShift</h2><p style="color:var(--muted);font-size:13px">保育園シフト・園運営カレンダー SaaS v16.2</p>
    <div class="grid"><div><label>メール</label><input id="email" type="email"></div><div><label>パスワード</label><input id="password" type="password"></div>
    <button class="btn primary" onclick="login()">ログイン</button><button class="btn" onclick="signup()">新規アカウント作成</button><button class="btn" onclick="resetPassword()">パスワード再設定</button></div>
    <div id="authmsg"></div>
  </div>
</div>

<div id="onboarding" class="auth wrap hidden">
 <div class="card"><h2>初期設定</h2><p style="color:var(--muted);font-size:13px">新しい園を登録するか、招待コードで既存の園へ参加してください。</p>
  <div class="grid">
   <div><label>新しい園名</label><input id="newGardenName" placeholder="例：さくら保育園"></div><button class="btn primary" onclick="createGarden()">園を新規登録</button>
   <hr style="width:100%;border:0;border-top:1px solid var(--line)">
   <div><label>招待コード</label><input id="inviteCode" placeholder="8桁コード"></div><button class="btn blue" onclick="joinGarden()">招待コードで参加</button>
  </div><div id="onboardmsg"></div>
 </div>
</div>

<div id="app" class="hidden">
<header class="top"><div><h1 id="gardenTitle">HoikuShift</h1><small id="userInfo"></small></div><button class="btn" onclick="logout()">ログアウト</button></header>
<main class="wrap">
 <div class="tabs">
  <button class="tab active" data-tab="calendar" onclick="showTab('calendar')">🗓 カレンダー</button>
  <button class="tab" data-tab="staff" onclick="showTab('staff')">👥 職員</button>
  <button class="tab" data-tab="events" onclick="showTab('events')">🏫 園行事</button>
  <button class="tab" data-tab="requests" onclick="showTab('requests')">📝 申請</button>
  <button class="tab admin-only" data-tab="admin" onclick="showTab('admin')">⚙️ 管理</button>
 </div>

 <section id="tab-calendar">
  <div class="card">
   <div style="display:flex;gap:6px;margin-bottom:12px"><button id="myMode" class="btn primary" onclick="setMode('my')">私の勤務</button><button id="gardenMode" class="btn" onclick="setMode('garden')">園全体・職員</button></div>
   <div class="toolbar"><button class="btn" onclick="moveMonth(-1)">◀</button><div id="monthLabel" class="month"></div><button class="btn" onclick="moveMonth(1)">▶</button><button class="btn" onclick="openPdfExportForm()">🖨 PDF出力</button></div>
   <div id="calendarNote"></div><table id="calendar"></table>
  </div>
 </section>

 <section id="tab-staff" class="hidden"><div class="card"><div class="toolbar"><h2>職員</h2><button class="btn primary admin-only" onclick="openStaffForm()">＋ 職員登録</button></div><div id="staffList"></div></div></section>
 <section id="tab-events" class="hidden"><div class="card"><div class="toolbar"><h2>園行事</h2><button class="btn primary admin-only" onclick="openEventForm()">＋ 行事登録</button></div><div id="eventList"></div></div></section>
 <section id="tab-requests" class="hidden"><div class="card"><div class="toolbar"><h2>希望休申請</h2><button class="btn primary" onclick="openRequestForm()">＋ 申請</button></div><div style="display:flex;gap:6px;margin:12px 0"><button id="currentRequestsTab" class="btn primary" onclick="setRequestView('current')">現在の申請</button><button id="historyRequestsTab" class="btn" onclick="setRequestView('history')">申請履歴</button></div><div id="requestHistoryFilter" class="hidden" style="margin-bottom:12px"><label>年月で絞り込み</label><input id="requestHistoryMonth" type="month" onchange="renderRequests()"></div><div id="requestList"></div></div></section>
 <section id="tab-admin" class="hidden"><div class="card"><h2>園管理</h2>
   <div class="grid g2"><button class="btn blue" onclick="generateShifts()">🔁 表示月のシフト自動生成</button><button class="btn" onclick="createInvite()">📨 職員招待コードを発行</button></div>
   <div id="adminMsg"></div>
   <hr style="border:0;border-top:1px solid var(--line);margin:18px 0">
   <h3>Google Calendar連携</h3><p style="font-size:12px;color:var(--muted)">OAuthクライアントID設定後、日本の祝日・園カレンダー同期を有効化できます。</p>
   <button class="btn" onclick="connectGoogleCalendar()">Google Calendarを接続</button><div id="googleMsg"></div>
 </div></section>
</main>
<nav class="bottom"><button class="active" data-tab="calendar" onclick="showTab('calendar')"><b>🗓</b>カレンダー</button><button data-tab="requests" onclick="showTab('requests')"><b>📝</b>申請</button><button data-tab="events" onclick="showTab('events')"><b>🏫</b>園行事</button><button data-tab="staff" onclick="showTab('staff')"><b>👥</b>職員</button></nav>
</div>
<div id="modal" class="modal hidden" onclick="if(event.target===this)closeModal()"><div class="sheet"><div id="modalBody"></div><button class="btn" style="width:100%;margin-top:12px" onclick="closeModal()">閉じる</button></div></div>
<div id="printArea" aria-hidden="true"></div>

<script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-functions-compat.js"></script>
<script src="./config.js"></script>
<script>
firebase.initializeApp(APP_CONFIG.firebase);
const auth=firebase.auth(), db=firebase.firestore(), fns=firebase.app().functions('asia-northeast1'), FV=firebase.firestore.FieldValue;
let user=null, profile=null, garden=null, gardenId=null, staff=[], members=[], events=[], requests=[], shifts={}, holidays=[], requestView='current';
let holidaySource='未取得';
let year=new Date().getFullYear(), month=new Date().getMonth(), mode='my';
const DOW=['日','月','火','水','木','金','土'];
const shiftNames={E:'早出',N:'通常',L:'遅出',O:'希望休',P:'有給',H:'休日'};
const JOB_ROLE_OPTIONS=['園長','副園長','主任','担任','副担任','フリー','補助'];

const JP_HOLIDAY_FALLBACK=[
{date:'2026-01-01',title:'元日'},{date:'2026-01-12',title:'成人の日'},{date:'2026-02-11',title:'建国記念の日'},{date:'2026-02-23',title:'天皇誕生日'},{date:'2026-03-20',title:'春分の日'},{date:'2026-04-29',title:'昭和の日'},{date:'2026-05-03',title:'憲法記念日'},{date:'2026-05-04',title:'みどりの日'},{date:'2026-05-05',title:'こどもの日'},{date:'2026-05-06',title:'休日'},{date:'2026-07-20',title:'海の日'},{date:'2026-08-11',title:'山の日'},{date:'2026-09-21',title:'敬老の日'},{date:'2026-09-22',title:'休日'},{date:'2026-09-23',title:'秋分の日'},{date:'2026-10-12',title:'スポーツの日'},{date:'2026-11-03',title:'文化の日'},{date:'2026-11-23',title:'勤労感謝の日'},
{date:'2027-01-01',title:'元日'},{date:'2027-01-11',title:'成人の日'},{date:'2027-02-11',title:'建国記念の日'},{date:'2027-02-23',title:'天皇誕生日'},{date:'2027-03-21',title:'春分の日'},{date:'2027-03-22',title:'休日'},{date:'2027-04-29',title:'昭和の日'},{date:'2027-05-03',title:'憲法記念日'},{date:'2027-05-04',title:'みどりの日'},{date:'2027-05-05',title:'こどもの日'},{date:'2027-07-19',title:'海の日'},{date:'2027-08-11',title:'山の日'},{date:'2027-09-20',title:'敬老の日'},{date:'2027-09-23',title:'秋分の日'},{date:'2027-10-11',title:'スポーツの日'},{date:'2027-11-03',title:'文化の日'},{date:'2027-11-23',title:'勤労感謝の日'}];
function holidayFor(date){return holidays.find(h=>h.date===date)||null}
function isHoliday(date){return !!holidayFor(date)}
function normalizeHolidayTitle(title){return String(title||'祝日').replace(/^Holiday$/i,'祝日').replace(/\s*\(.*?\)\s*$/,'').trim()}
async function loadJapaneseHolidays(){
 const apiKey=APP_CONFIG.googleCalendarApiKey,calendarId=APP_CONFIG.googleHolidayCalendarId;
 const start=`${year}-01-01T00:00:00+09:00`,end=`${year+1}-12-31T23:59:59+09:00`;
 if(!apiKey||!calendarId){holidays=JP_HOLIDAY_FALLBACK.filter(h=>h.date.startsWith(String(year))||h.date.startsWith(String(year+1)));holidaySource='内蔵祝日データ（Google未設定）';return}
 try{
  const url='https://www.googleapis.com/calendar/v3/calendars/'+encodeURIComponent(calendarId)+'/events?singleEvents=true&orderBy=startTime&timeMin='+encodeURIComponent(start)+'&timeMax='+encodeURIComponent(end)+'&maxResults=2500&key='+encodeURIComponent(apiKey);
  const res=await fetch(url);if(!res.ok)throw new Error(`Google Calendar API ${res.status}`);const data=await res.json();
  holidays=(data.items||[]).filter(e=>e.start?.date).map(e=>({date:e.start.date,title:normalizeHolidayTitle(e.summary),googleEventId:e.id}));
  if(!holidays.length)throw new Error('祝日イベントが0件です');holidaySource='Google Calendar 日本の祝日';
 }catch(e){console.warn('Google祝日取得失敗。フォールバックを使用します。',e);holidays=JP_HOLIDAY_FALLBACK.filter(h=>h.date.startsWith(String(year))||h.date.startsWith(String(year+1)));holidaySource='内蔵祝日データ（Google取得失敗）'}
}

const isAdmin=()=>profile&&['owner','admin'].includes(profile.role);
const isOwner=()=>profile?.role==='owner';
const col=(name)=>db.collection('gardens').doc(gardenId).collection(name);
const ymd=(y,m,d)=>`${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
const esc=s=>String(s??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
function msg(id,text,err=false){document.getElementById(id).innerHTML=`<div class="notice" style="${err?'background:#fee2e2;color:#991b1b':''}">${esc(text)}</div>`}
async function login(){try{await auth.signInWithEmailAndPassword(email.value,password.value)}catch(e){msg('authmsg',e.message,true)}}
async function signup(){try{await auth.createUserWithEmailAndPassword(email.value,password.value)}catch(e){msg('authmsg',e.message,true)}}
async function resetPassword(){if(!email.value)return msg('authmsg','メールアドレスを入力してください。',true);try{await auth.sendPasswordResetEmail(email.value);msg('authmsg','再設定メールを送信しました。')}catch(e){msg('authmsg',e.message,true)}}
function logout(){auth.signOut()}
auth.onAuthStateChanged(async u=>{
 user=u; document.getElementById('auth').classList.toggle('hidden',!!u);
 if(!u){app.classList.add('hidden');onboarding.classList.add('hidden');return}
 try{
  const snap=await db.collection('users').doc(u.uid).get();
  if(!snap.exists){
    profile=null;gardenId=null;
    onboarding.classList.remove('hidden');app.classList.add('hidden');
    return;
  }
  profile=snap.data();
  gardenId=profile?.gardenId||null;
  if(!gardenId){
    profile=null;gardenId=null;
    onboarding.classList.remove('hidden');app.classList.add('hidden');
    msg('onboardmsg','旧版アカウントを検出しました。SaaS版の園登録を行ってください。');
    return;
  }
  const gardenSnap=await db.collection('gardens').doc(gardenId).get();
  if(!gardenSnap.exists){
    profile=null;gardenId=null;
    onboarding.classList.remove('hidden');app.classList.add('hidden');
    msg('onboardmsg','園データが見つかりません。SaaS版の園登録を行ってください。');
    return;
  }
  await boot();
 }catch(e){
  console.error('初期化エラー',e);
  app.classList.add('hidden');
  onboarding.classList.remove('hidden');
  msg('onboardmsg',`初期化エラー: ${e.message||e}`,true);
 }
});
async function createGarden(){
 const name=newGardenName.value.trim();if(!name)return msg('onboardmsg','園名を入力してください。',true);
 try{
  const result=await fns.httpsCallable('createGarden')({name});
  profile={email:user.email,gardenId:result.data.gardenId,role:result.data.role,staffId:result.data.staffId};gardenId=result.data.gardenId;await boot();
 }catch(e){msg('onboardmsg',e.message,true)}
}
async function joinGarden(){
 const code=inviteCode.value.trim();if(!code)return msg('onboardmsg','招待コードを入力してください。',true);
 try{
  const result=await fns.httpsCallable('acceptInvite')({code});
  const snap=await db.collection('users').doc(user.uid).get();profile=snap.data();gardenId=result.data.gardenId;await boot();
 }catch(e){msg('onboardmsg',e.message,true)}
}
async function boot(){
 onboarding.classList.add('hidden');app.classList.remove('hidden');
 const g=await db.collection('gardens').doc(gardenId).get();garden=g.data();
 gardenTitle.textContent=garden?.name||'HoikuShift';userInfo.textContent=`${user.email} / ${profile.role}`;
 document.querySelectorAll('.admin-only').forEach(x=>x.classList.toggle('hidden',!isAdmin()));
 await loadAll();showTab('calendar');
}
async function loadAll(){
 const requestQuery=isAdmin()?col('requests'):col('requests').where('uid','==',user.uid);
 const memberQuery=isAdmin()?col('members').get():Promise.resolve(null);
 const [ss,es,rs,ms]=await Promise.all([col('staff').get(),col('events').get(),requestQuery.get(),memberQuery]);
 staff=ss.docs.map(d=>({id:d.id,...d.data()}));events=es.docs.map(d=>({id:d.id,...d.data()}));requests=rs.docs.map(d=>({id:d.id,...d.data()}));
 members=ms?ms.docs.map(d=>({id:d.id,...d.data()})):[];
 await Promise.all([loadShifts(),loadJapaneseHolidays()]);renderAll();
}
async function loadShifts(){
 const prefix=`${year}-${String(month+1).padStart(2,'0')}`;
 const s=await col('shifts').where('month','==',prefix).get();shifts={};s.forEach(d=>{shifts[d.id]=d.data().shift});
}
function renderAll(){renderCalendar();renderStaff();renderEvents();renderRequests()}
function showTab(t){document.querySelectorAll('main section').forEach(s=>s.classList.add('hidden'));document.getElementById('tab-'+t).classList.remove('hidden');document.querySelectorAll('[data-tab]').forEach(b=>b.classList.toggle('active',b.dataset.tab===t));if(t==='calendar')renderCalendar()}
function setMode(m){mode=m;myMode.className='btn '+(m==='my'?'primary':'');gardenMode.className='btn '+(m==='garden'?'primary':'');renderCalendar()}
async function moveMonth(n){month+=n;if(month<0){month=11;year--}if(month>11){month=0;year++}await Promise.all([loadShifts(),loadJapaneseHolidays()]);renderCalendar()}
function myStaff(){return staff.find(s=>s.id===profile.staffId)||staff.find(s=>s.email?.toLowerCase()===user.email.toLowerCase())||null}
function getShift(date,id){return shifts[`${date}_${id}`]||null}
function working(date){return staff.filter(s=>['E','N','L'].includes(getShift(date,s.id)))}
function renderCalendar(){
 monthLabel.textContent=`${year}年${month+1}月`;const mine=myStaff();
 calendarNote.innerHTML=(mode==='my'&&!mine?'<div class="notice">職員情報との紐付けがまだありません。園管理者にメール登録を依頼してください。</div>':'')+`<div class="calendar-source">祝日基準：${esc(holidaySource)} ／ 園行事：${events.length}件登録</div>`;
 let h='<thead><tr>'+DOW.map((x,i)=>`<th style="${i===0?'color:#dc2626':i===6?'color:#2563eb':''}">${x}</th>`).join('')+'</tr></thead><tbody>',day=1,first=new Date(year,month,1).getDay(),days=new Date(year,month+1,0).getDate();
 for(let w=0;w<6&&day<=days;w++){h+='<tr>';for(let dow=0;dow<7;dow++){
  if((w===0&&dow<first)||day>days){h+='<td><div class="day empty"></div></td>';continue}
  const date=ymd(year,month,day),ev=events.filter(e=>e.date===date),hol=holidayFor(date);let body='';if(hol)body+=`<div class="holiday">🇯🇵 ${esc(hol.title)}</div>`;
  if(mode==='my'){const sh=mine?getShift(date,mine.id):null,displayShift=hol&&!sh?'H':sh;body+=`<span class="pill ${displayShift||'H'}">${shiftNames[displayShift]||'未定'}</span>`;ev.slice(0,2).forEach(e=>body+=`<div class="event">🏫 ${esc(e.title)}</div>`)}else{const ws=working(date),e=ws.filter(s=>getShift(date,s.id)==='E').length,l=ws.filter(s=>getShift(date,s.id)==='L').length;ev.slice(0,2).forEach(x=>body+=`<div class="event">🏫 ${esc(x.title)}</div>`);body+=`<div class="count"><b>${ws.length}名勤務</b><br>早${e}・遅${l}</div>`}
  h+=`<td><div class="day ${hol?'holiday-day':''}" onclick="openDay('${date}')"><div class="date ${hol||dow===0?'holiday-date':''}" style="${dow===6&&!hol?'color:#2563eb':''}">${day}</div>${body}</div></td>`;day++
 }h+='</tr>'}calendar.innerHTML=h+'</tbody>'
}
function openDay(date){
 const ws=working(date),ev=events.filter(e=>e.date===date),mine=myStaff(),hol=holidayFor(date);let h=`<h2>${esc(date)}</h2>`;
 if(hol)h+=`<div class="notice" style="background:#fee2e2;color:#b91c1c"><b>🇯🇵 ${esc(hol.title)}</b><br><small>${esc(holidaySource)}</small></div>`;
 if(mine)h+=`<div class="card"><b>あなたの勤務</b><span class="pill ${getShift(date,mine.id)||'H'}">${shiftNames[getShift(date,mine.id)]||(hol?'休日':'未定')}</span></div>`;
 h+='<h3>園の予定</h3>'+(ev.length?ev.map(e=>`<div class="notice">📌 ${esc(e.title)}</div>`).join(''):'<p>登録行事なし</p>');

async function printHolidayData(targetYear){
 if(targetYear===year)return holidays;
 const apiKey=APP_CONFIG.googleCalendarApiKey,calendarId=APP_CONFIG.googleHolidayCalendarId;
 if(!apiKey||!calendarId)return JP_HOLIDAY_FALLBACK.filter(h=>h.date.startsWith(String(targetYear)));
 try{
  const start=`${targetYear}-01-01T00:00:00+09:00`,end=`${targetYear}-12-31T23:59:59+09:00`;
  const url='https://www.googleapis.com/calendar/v3/calendars/'+encodeURIComponent(calendarId)+'/events?singleEvents=true&orderBy=startTime&timeMin='+encodeURIComponent(start)+'&timeMax='+encodeURIComponent(end)+'&maxResults=2500&key='+encodeURIComponent(apiKey);
  const res=await fetch(url);if(!res.ok)throw new Error(`Google Calendar API ${res.status}`);const data=await res.json();
  return (data.items||[]).filter(e=>e.start?.date).map(e=>({date:e.start.date,title:normalizeHolidayTitle(e.summary)}));
 }catch(e){console.warn('PDF用祝日取得失敗。フォールバックを使用します。',e);return JP_HOLIDAY_FALLBACK.filter(h=>h.date.startsWith(String(targetYear)));}
}
async function printMonthlySchedule(){
 const value=pdfMonth?.value;if(!/^\d{4}-\d{2}$/.test(value||''))return msg('pdfMsg','対象月を選択してください。',true);
 const [targetYear,targetMonth]=value.split('-').map(Number),admin=isAdmin(),mine=myStaff();
 let type=pdfType?.value||'individual',selected=[];
 if(!admin){
  if(!mine)return msg('pdfMsg','本人に紐付く職員情報がありません。',true);
  type='individual';selected=[mine];
 }else if(type==='garden')selected=[...staff];
 else if(type==='class')selected=staff.filter(s=>s.className===(pdfClass?.value||''));
 else selected=staff.filter(s=>s.id===(pdfStaff?.value||''));
 if(!selected.length)return msg('pdfMsg','出力対象の職員を選択してください。',true);
 try{
  const [shiftSnap,printHolidays]=await Promise.all([col('shifts').where('month','==',value).get(),printHolidayData(targetYear)]);
  const printShifts={};shiftSnap.forEach(d=>{const data=d.data();printShifts[`${data.date}_${data.staffId}`]=data.shift});
  const days=new Date(targetYear,targetMonth,0).getDate(),holidayMap=new Map(printHolidays.map(h=>[h.date,h.title]));
  const typeLabel=type==='garden'?'園全体':type==='class'?`${pdfClass.value}（クラス別）`:`${selected[0].name}（個人）`;
  let headers='<th>職員</th>',dateCells=[];
  for(let d=1;d<=days;d++){
   const date=ymd(targetYear,targetMonth-1,d),dow=new Date(targetYear,targetMonth-1,d).getDay(),holiday=holidayMap.get(date),eventNames=events.filter(e=>e.date===date).map(e=>e.title).join('・');
   const cls=holiday?'holiday':dow===0?'sunday':dow===6?'weekend':'';
   headers+=`<th class="${cls}">${d}<br>(${DOW[dow]})${holiday?`<span class="event-note">${esc(holiday)}</span>`:''}${eventNames?`<span class="event-note">🏫 ${esc(eventNames)}</span>`:''}</th>`;
   dateCells.push({date,cls});
  }
  const rows=selected.map(s=>`<tr><td><b>${esc(s.name)}</b>${s.className?`<br><small>${esc(s.className)}</small>`:''}</td>${dateCells.map(({date,cls})=>{const code=printShifts[`${date}_${s.id}`]||(holidayMap.has(date)?'H':'');return `<td class="${cls}"><span class="shift-code">${esc(code||'未定')}</span><span class="shift-name">${esc(shiftNames[code]||'未定')}</span></td>`}).join('')}</tr>`).join('');
  printArea.innerHTML=`<div class="print-title"><div><h1>${esc(garden?.name||'HoikuShift')} 月間勤務表</h1><p>${targetYear}年${targetMonth}月 ／ ${esc(typeLabel)}</p></div><p>出力日: ${new Date().toLocaleDateString('ja-JP')}</p></div><table class="print-table"><thead><tr>${headers}</tr></thead><tbody>${rows}</tbody></table><div class="print-footer">勤務区分：早出／通常／遅出／希望休／有給／休日　　園行事・日本の祝日を併記</div>`;
  closeModal();requestAnimationFrame(()=>window.print());
 }catch(e){console.error('PDF出力エラー',e);msg('pdfMsg','勤務表の作成に失敗しました。通信状態を確認して再度お試しください。',true);}
}
const staffJobRoles=s=>Array.isArray(s?.jobRoles)?s.jobRoles.filter(role=>JOB_ROLE_OPTIONS.includes(role)):[];

 staffList.innerHTML=staff.length?staff.map(s=>{

 }).join(''):'<p>職員未登録</p>';

function renderEvents(){eventList.innerHTML=events.length?events.sort((a,b)=>a.date.localeCompare(b.date)).map(e=>`<div class="listrow"><span><b>${esc(e.title)}</b><br><small>${esc(e.date)} / ${esc(e.type||'行事')}</small></span></div>`).join(''):'<p>行事未登録</p>'}
function openEventForm(){openModal(`<h2>園行事登録</h2><div class="grid"><div><label>日付</label><input id="eDate" type="date"></div><div><label>行事名</label><input id="eTitle"></div><div><label>種別</label><select id="eType"><option>行事</option><option>休園</option><option>職員研修</option><option>会議</option></select></div><button class="btn primary" onclick="saveEvent()">登録</button></div>`)}
async function saveEvent(){await col('events').add({date:eDate.value,title:eTitle.value,type:eType.value,createdAt:FV.serverTimestamp()});closeModal();await loadAll()}
const requestStatusName={pending:'申請中',approved:'承認',rejected:'却下','申請中':'申請中','承認':'承認','却下':'却下'};
function requestHistoryStart(date){
 const match=String(date||'').match(/^(\d{4})-(\d{2})-\d{2}$/);if(!match)return null;
 return new Date(Number(match[1]),Number(match[2])+1,1);
}
function isRequestHistory(r,now=new Date()){
 const start=requestHistoryStart(r.date);if(!start)return false;
 const today=new Date(now.getFullYear(),now.getMonth(),now.getDate());return today>=start;
}
function requestTimestamp(value){
 if(!value)return '';
 const date=typeof value.toDate==='function'?value.toDate():value instanceof Date?value:null;
 return date&&!Number.isNaN(date.getTime())?date.toLocaleString('ja-JP'):'';
}
function requestStaffName(r){return staff.find(s=>s.id===r.staffId)?.name||''}
function setRequestView(view){requestView=view==='history'?'history':'current';renderRequests()}
function renderRequests(){
 const all=isAdmin()?requests:requests.filter(r=>r.uid===user.uid);
 const current=all.filter(r=>!isRequestHistory(r)),history=all.filter(r=>isRequestHistory(r));
 const list=(requestView==='history'?history:current).filter(r=>requestView!=='history'||!requestHistoryMonth?.value||String(r.date||'').startsWith(requestHistoryMonth.value)).sort((a,b)=>String(a.date||'').localeCompare(String(b.date||'')));
 currentRequestsTab?.classList.toggle('primary',requestView==='current');historyRequestsTab?.classList.toggle('primary',requestView==='history');
 requestHistoryFilter?.classList.toggle('hidden',requestView!=='history');
 requestList.innerHTML=list.length?list.map(r=>{
  const status=requestStatusName[r.status]||r.status||'申請中',staffName=requestStaffName(r);
  const created=requestTimestamp(r.createdAt),reviewed=requestTimestamp(r.approvedAt||r.rejectedAt||r.reviewedAt||r.updatedAt);
  const canReview=isAdmin()&&requestView==='current'&&['pending','申請中'].includes(r.status);
  return `<div class="listrow"><span><b>${esc(r.date)}</b>${staffName?` <small>／ ${esc(staffName)}</small>`:''}<br><small>${esc(r.reason||'希望休')} ／ ${esc(status)}${created?`<br>申請: ${esc(created)}`:''}${reviewed?`<br>承認・却下: ${esc(reviewed)}`:''}</small></span><span style="display:flex;gap:6px">${canReview?`<button class="btn" onclick="approveRequest('${r.id}')">承認</button><button class="btn danger" onclick="rejectRequest('${r.id}')">却下</button>`:''}</span></div>`;
 }).join(''):`<p>${requestView==='history'?'該当する申請履歴はありません':'現在の申請はありません'}</p>`;
}

async function reviewRequest(id,status){
 if(!isAdmin())return;
 const request=requests.find(r=>r.id===id);if(!request||isRequestHistory(request)||!['pending','申請中'].includes(request.status))return;
 await col('requests').doc(id).update({status});await loadAll();
}
async function approveRequest(id){return reviewRequest(id,'approved')}

function allowedShift(s,prev){if(s.shiftType==='early')return 'E';if(s.shiftType==='late')return 'L';if(s.shiftType==='normal')return 'N';const seq=['E','N','L'];let pick=seq[Math.floor(Math.random()*3)];if((pick==='E'||pick==='L')&&pick===prev)pick='N';return pick}
async function generateShifts(){
 if(!isAdmin())return; if(!staff.length)return msg('adminMsg','職員を登録してください。',true);
 const prefix=`${year}-${String(month+1).padStart(2,'0')}`,days=new Date(year,month+1,0).getDate(),batchWrites=[];
 for(let d=1;d<=days;d++){const date=ymd(year,month,d),dow=new Date(year,month,d).getDay();for(const s of staff){
  let sh='H';if(!isHoliday(date)&&dow>=1&&dow<=5)sh=allowedShift(s,getShift(ymd(year,month,d-1),s.id));else if(!isHoliday(date)&&dow===6&&s.saturday!=='no'&&Math.random()<.45)sh=allowedShift(s,null);
  const id=`${date}_${s.id}`;batchWrites.push({id,data:{date,staffId:s.id,shift:sh,month:prefix}})
 }}
 for(let i=0;i<batchWrites.length;i+=400){const b=db.batch();batchWrites.slice(i,i+400).forEach(x=>b.set(col('shifts').doc(x.id),x.data));await b.commit()}
 await loadShifts();renderCalendar();msg('adminMsg',`${year}年${month+1}月のシフトを生成・保存しました。`);
}

 if(!isAdmin())return;const unlinked=staff.filter(s=>s.email&&!s.invited);if(!unlinked.length)return msg('adminMsg','メール登録済みで未招待の職員がいません。',true);
 const s=unlinked[0],result=await fns.httpsCallable('createInvite')({gardenId,staffId:s.id});
 msg('adminMsg',`${s.name}先生 招待コード: ${result.data.code}（有効期限: ${new Date(result.data.expiresAt).toLocaleString('ja-JP')}）`);
}

 msg('googleMsg','Google Calendar OAuth接続モジュールは次フェーズで有効化します。');
