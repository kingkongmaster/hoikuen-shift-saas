services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-enshift}
      POSTGRES_USER: ${POSTGRES_USER:-enshift}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: ./apps/api
    environment:
      API_PORT: ${API_PORT:-3000}
      DATABASE_URL: ${DATABASE_URL:-postgresql://enshift:enshift@postgres:5432/enshift}
      DATABASE_CONNECT_ON_STARTUP: "true"
      JWT_SECRET: ${JWT_SECRET:?Set JWT_SECRET in .env}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-8h}
    depends_on:
      migrate:
        condition: service_completed_successfully
      seed:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy

  migrate:
    build:
      context: ./apps/api
      target: build
    command: npx prisma migrate deploy
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql://enshift:enshift@postgres:5432/enshift}
    depends_on:
      postgres:
        condition: service_healthy

  seed:
    build:
      context: ./apps/api
      target: build
    command: node prisma/seed.cjs
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql://enshift:enshift@postgres:5432/enshift}
      SEED_DEMO_DATA: ${SEED_DEMO_DATA:-true}
      SEED_OWNER_EMAIL: ${SEED_OWNER_EMAIL:-owner@demo.enshift.local}
      SEED_OWNER_PASSWORD: ${SEED_OWNER_PASSWORD:-ChangeMe123!}
    depends_on:
      migrate:
        condition: service_completed_successfully

  web:
    build:
      context: ./apps/web
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-/api}
    ports:
      - "8080:80"
    depends_on:
      - api

  api-test:
    profiles: ["test"]
    build:
      context: ./apps/api
      target: build
    command: npm run test:all
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql://enshift:enshift@postgres:5432/enshift}
      API_BASE_URL: http://web/api
      SEED_OWNER_EMAIL: ${SEED_OWNER_EMAIL:-owner@demo.enshift.local}
      SEED_OWNER_PASSWORD: ${SEED_OWNER_PASSWORD:-ChangeMe123!}
    depends_on:
      web:
        condition: service_started

volumes:
  postgres_data:
